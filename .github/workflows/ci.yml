name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Install package deps without Selenium/browser extras that need Chrome
          pip install pandas soccerdata || true

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; ignore line-length (E501)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Full lint as warnings (non-blocking)
          flake8 . --count --exit-zero --max-line-length=120 --statistics \
            --exclude=soccer_env,__pycache__,.git

      - name: Check imports (no Selenium/browser needed)
        run: |
          python -c "from src.sanitize import canonicalize_team, canonicalize_teams, normalize_coords, normalize_date"
          python -c "from src.utils import ensure_dir"
          echo "Core imports OK"
